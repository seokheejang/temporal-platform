# Temporal DB 자격증명 — Vault KV → ESO (keycloak 패턴 동일, basic-auth)
# ⚠️ 선행 시드 (운영자, KV write 토큰):
#   vault kv put secret/k8s/temporal/example-service/dev/db username=temporal password=<생성>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: temporal-pg-app
  namespace: dev-temporal-example-service
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-secret-store
  target:
    name: temporal-pg-app
    template:
      type: kubernetes.io/basic-auth # cnpg initdb secret 요구 타입
  data:
    - secretKey: username
      remoteRef:
        key: k8s/temporal/example-service/dev/db
        property: username
    - secretKey: password
      remoteRef:
        key: k8s/temporal/example-service/dev/db
        property: password
