# example-service Temporal — umbrella wrapper (ADR-0005)
# 공식 차트를 dependency로 pin. 버전 업그레이드 = 이 파일 + Chart.lock 갱신 (서비스별 독립 카나리).
# 부속 리소스(B3 Certificate · C2 UI HTTPRoute 등)는 templates/에 추가.
apiVersion: v2
name: temporal-example-service
description: "example-service Temporal cluster (umbrella wrapper — upstream temporalio/temporal)"
type: application
version: 0.1.0
appVersion: "1.31.0" # = pinned upstream server 버전 (참고용 — 실제는 dependency가 결정)
dependencies:
  - name: temporal
    version: 1.2.0
    repository: https://go.temporal.io/helm-charts
