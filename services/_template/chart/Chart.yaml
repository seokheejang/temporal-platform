# 새 서비스 스캐폴딩: 이 디렉토리를 services/<svc>/로 복사 후 <SERVICE> 치환.
# 살아있는 레퍼런스: services/example-service/ (ADR-0005)
apiVersion: v2
name: temporal-<SERVICE>
description: "<SERVICE> Temporal cluster (umbrella wrapper)"
type: application
version: 0.1.0
appVersion: "1.31.0"
dependencies:
  - name: temporal
    version: 1.2.0 # 서비스별 독립 pin — 복사 시점의 최신 안정 버전으로
    repository: https://go.temporal.io/helm-charts
