{{- if .Values.externalSecret.enabled }}
{{- /*
앱 시크릿 ESO 연동 — ClusterSecretStore(vault-secret-store)가 Vault KV(vaultPath)를 읽어
secretName K8s Secret을 생성한다. 워커는 envFrom: [secretRef: secretName]으로 평문 env처럼 받는다.
이 ExternalSecret이 차트(=worker 앱)에 포함돼야 생성 Secret이 worker와 같은 ns에 만들어진다
(worker는 서버/DB와 다른 ns: {env}-temporal-{svc}-worker). 비밀값은 git에 없음 — Vault 경로 참조만.
실측 근거: dev ClusterSecretStore vault-secret-store = kubernetes auth(eso-role)/vault/KV v2(mount secret),
db ExternalSecret(temporal-pg-app)이 같은 store로 SecretSynced 확인.
운영자 선행: vault kv put secret/<vaultPath> <property>=<값> (KV write 토큰 필요).
*/}}
{{- if not .Values.externalSecret.vaultPath }}
{{- fail "externalSecret.enabled=true 이면 externalSecret.vaultPath 필수 (예: k8s/temporal/example-service/dev/activity-worker)" }}
{{- end }}
{{- if not .Values.externalSecret.secretName }}
{{- fail "externalSecret.enabled=true 이면 externalSecret.secretName 필수 (envFrom에서 참조할 Secret 이름)" }}
{{- end }}
{{- if not .Values.externalSecret.data }}
{{- fail "externalSecret.enabled=true 이면 externalSecret.data 필수 ([{secretKey, property}] — Vault KV 키 → env 매핑)" }}
{{- end }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.secretName }}
  labels:
    {{- include "temporal-worker.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
    name: {{ .Values.externalSecret.secretStoreRef.name }}
  target:
    name: {{ .Values.externalSecret.secretName }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ $.Values.externalSecret.vaultPath }}
        property: {{ .property }}
    {{- end }}
{{- end }}
