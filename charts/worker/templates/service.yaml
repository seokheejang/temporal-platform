{{- if .Values.metrics.enabled }}
{{/*
  메트릭 전용 headless Service (방식 A — temporal-server와 동일 패턴).
  worker는 outbound-only(7233만 나감)라 트래픽 라우팅용 Service가 본래 불필요 →
  clusterIP: None(headless)으로 VIP/LB 없이 ServiceMonitor의 스크랩 타깃 역할만 한다.
  ServiceMonitor가 이 Service의 selectorLabels로 매칭 → Endpoints(=worker pod):metrics 를 스크랩.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "temporal-worker.fullname" . }}-metrics
  labels:
    {{- include "temporal-worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None # headless — VIP 없이 pod 직접(메트릭 스크랩 전용)
  selector:
    {{- include "temporal-worker.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics # deployment containerPort name 참조
      protocol: TCP
{{- end }}
