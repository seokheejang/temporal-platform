# Keycloak 시크릿 — Vault KV(vault) → ESO → k8s Secret (기존 cnpg 패턴 동일: basic-auth)
# ⚠️ 선행: 운영자가 Vault KV에 시드 필요 (KV 쓰기는 temporal-pki 토큰 권한 밖):
#   vault kv put secret/k8s/keycloak/dev/db    username=keycloak password=<생성>
#   vault kv put secret/k8s/keycloak/dev/admin username=admin    password=<생성>
---
# cnpg initdb용 DB 자격증명 (+ keycloakx database.existingSecret로도 사용)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-pg-app
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-secret-store
  target:
    name: keycloak-pg-app
    template:
      type: kubernetes.io/basic-auth # cnpg initdb secret 요구 타입 (기존 another-workload-pg 패턴 동일)
  data:
    - secretKey: username
      remoteRef:
        key: k8s/keycloak/dev/db
        property: username
    - secretKey: password
      remoteRef:
        key: k8s/keycloak/dev/db
        property: password
---
# Keycloak 부트스트랩 admin 계정 (KC_BOOTSTRAP_ADMIN_* env로 주입)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-admin
  namespace: keycloak
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-secret-store
  target:
    name: keycloak-admin
  data:
    - secretKey: username
      remoteRef:
        key: k8s/keycloak/dev/admin
        property: username
    - secretKey: password
      remoteRef:
        key: k8s/keycloak/dev/admin
        property: password
